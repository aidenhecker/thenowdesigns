name: Engine tests

on:
  pull_request:
    paths:
      - 'engine/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/engine-tests.yml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck + unit tests
        run: npm run engine:test

      - name: Offline end-to-end brief
        run: node engine/dist/src/cli.js daily --offline --out /tmp/brief-e2e
