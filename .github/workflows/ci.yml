name: Validate site and preview Worker

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check site
        run: npm run typecheck
      - name: Test Worker safety contract
        run: npm run worker:test
      - name: Validate Worker deployment
        run: npm run worker:check
      - name: Build static site
        run: npm run build
